<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskNotes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>TaskNotes</h1>
          <p class="subtitle">Fast local tasks and notes</p>
        </div>

        <div class="tab-switch" role="tablist" aria-label="Sections">
          <button id="tabTasks" class="tab active" role="tab" aria-selected="true">Tasks</button>
          <button id="tabNotes" class="tab" role="tab" aria-selected="false">Notes</button>
          <button id="tabTrash" class="tab" role="tab" aria-selected="false">Trash</button>
        </div>

        <div class="header-controls">
          <button id="newItemButton" class="primary">+ New Task</button>

          <label class="control">
            <span>Sort</span>
            <select id="sortSelect"></select>
          </label>

          <label id="taskFilterWrap" class="control">
            <span>Show</span>
            <select id="taskFilterSelect">
              <option value="all">All</option>
              <option value="open">Open</option>
              <option value="done">Done</option>
            </select>
          </label>

          <label class="control search-control">
            <span>Search</span>
            <input id="searchInput" type="search" placeholder="Find text..." />
          </label>

          <label class="control">
            <span>Tag</span>
            <select id="tagFilterSelect">
              <option value="all">All tags</option>
            </select>
          </label>

          <label class="control search-control">
            <span>New tag</span>
            <input id="newTagInput" type="text" placeholder="work" />
          </label>

          <button id="addTagButton" class="ghost">Add Tag</button>

          <button id="exportButton" class="ghost">Export</button>
          <button id="importButton" class="ghost">Import</button>
          <button id="selectDataFileButton" class="ghost">Data File...</button>
          <button id="defaultDataFileButton" class="ghost">Use Default Data</button>
          <button id="loginButton" class="ghost">Login</button>
          <button id="logoutButton" class="ghost" style="display:none">Logout</button>
        </div>

        <aside id="taskStats" class="task-stats"></aside>
        <div id="globalTagsBar" class="global-tags-bar"></div>
      </header>

      <main class="content">
        <section id="listContainer" class="list" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" aria-live="assertive" aria-hidden="true">
      <span id="toastMessage"></span>
      <button id="toastUndo" class="ghost">Undo</button>
    </div>

    <div id="loginModal" class="modal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
        <h2 id="loginModalTitle">Accedi a TaskNotes</h2>
        <p class="modal-subtitle">Inserisci le credenziali per abilitare la sincronizzazione cloud.</p>
        <div class="modal-row">
          <label style="flex:1">
            <span style="display:block;margin-bottom:4px;font-size:0.85rem">Email</span>
            <input id="loginEmailInput" type="email" placeholder="tu@esempio.com" style="width:100%" autocomplete="username" />
          </label>
        </div>
        <div class="modal-row">
          <label style="flex:1">
            <span style="display:block;margin-bottom:4px;font-size:0.85rem">Password</span>
            <input id="loginPasswordInput" type="password" placeholder="••••••••" style="width:100%" autocomplete="current-password" />
          </label>
        </div>
        <div id="loginNewPasswordRow" class="modal-row" style="display:none">
          <label style="flex:1">
            <span style="display:block;margin-bottom:4px;font-size:0.85rem">Nuova password permanente</span>
            <input id="loginNewPasswordInput" type="password" placeholder="Min 8 caratteri" style="width:100%" />
          </label>
        </div>
        <div id="loginError" style="color:#e74c3c;font-size:0.85rem;min-height:1.2em"></div>
        <div class="modal-actions">
          <button id="loginSubmitButton" class="primary">Accedi</button>
          <button id="loginSkipButton" class="ghost">Salta (solo locale)</button>
        </div>
      </div>
    </div>

    <div id="dataPickerModal" class="modal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="dataPickerTitle">
        <h2 id="dataPickerTitle">Choose Data File</h2>
        <p class="modal-subtitle">Select a data file or create a new one (extension is managed automatically).</p>
        <div id="dataPickerList" class="data-picker-list"></div>
        <div class="modal-row">
          <input id="newDataFileInput" type="text" placeholder="new-file-name" />
          <button id="createDataFileButton" class="primary">Create</button>
        </div>
        <div class="modal-actions">
          <button id="closeDataPickerButton" class="ghost">Close</button>
        </div>
      </div>
    </div>

    <footer class="statusbar">
      <span class="status-left">
        <span id="statusText">Ready</span>
        <span id="activeDataHint" class="active-data-hint"></span>
      </span>
      <span id="dataPathText"></span>
    </footer>

    <script src="./renderer.js"></script>
  </body>
</html>
